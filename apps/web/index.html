
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buildora | The Standard for Modern Hackathons</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <script>
      (function() {
        var t = localStorage.getItem('buildora-theme') || 'light';
        document.documentElement.classList.add(t);
      })();
    </script>
    <style>
      /* ---- Theme: Light (default) ---- */
      :root {
        --neon-primary: #6366f1;
        --neon-secondary: #06b6d4;

        --bg-deep: #ffffff;
        --bg-page: #f8fafc;
        --bg-surface: rgba(255, 255, 255, 0.8);
        --bg-surface-hover: rgba(241, 245, 249, 0.9);
        --bg-elevated: #ffffff;
        --bg-input: rgba(241, 245, 249, 0.6);

        --border-default: rgba(15, 23, 42, 0.1);
        --border-subtle: rgba(15, 23, 42, 0.06);
        --border-hover: rgba(15, 23, 42, 0.18);

        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-tertiary: #64748b;
        --text-muted: #94a3b8;
        --text-heading: #0f172a;
        --text-on-accent: #ffffff;

        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(15, 23, 42, 0.08);
        --glass-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.1);
        --neon-glow-shadow: 0 0 20px rgba(99, 102, 241, 0.2);

        --blob-opacity: 0.08;
        --overlay-bg: rgba(15, 23, 42, 0.3);

        --nav-bg: rgba(255, 255, 255, 0.85);
        --nav-active: #6366f1;
        --nav-inactive: #64748b;

        --canvas-bg: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #ffffff 100%);

        --accent-bg: #6366f1;
        --accent-bg-soft: rgba(99, 102, 241, 0.12);
        --accent-bg-active: rgba(99, 102, 241, 0.12);
        --accent-border: rgba(99, 102, 241, 0.3);
        --accent-border-active: rgba(99, 102, 241, 0.5);
        --accent-text: #4f46e5;
        --accent-text-soft: #4338ca;
        --accent-text-on-active: #312e81;

        --auth-hero-bg: linear-gradient(140deg, #f8fbff 0%, #f3f8ff 48%, #eef5ff 100%);
        --auth-hero-text: #0f172a;
        --auth-hero-muted: #475569;
        --auth-hero-quote: rgba(15, 23, 42, 0.12);
        --auth-hero-ring-indigo: rgba(99, 102, 241, 0.12);
        --auth-hero-ring-cyan: rgba(6, 182, 212, 0.12);
        --auth-hero-line: rgba(6, 182, 212, 0.3);
      }

      /* ---- Theme: Dark ---- */
      html.dark {
        --bg-deep: #030712;
        --bg-page: #05060c;
        --bg-surface: rgba(15, 23, 42, 0.6);
        --bg-surface-hover: rgba(15, 23, 42, 0.8);
        --bg-elevated: #0a111d;
        --bg-input: rgba(255, 255, 255, 0.05);

        --border-default: rgba(255, 255, 255, 0.08);
        --border-subtle: rgba(255, 255, 255, 0.05);
        --border-hover: rgba(255, 255, 255, 0.15);

        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --text-tertiary: #64748b;
        --text-muted: #475569;
        --text-heading: #ffffff;

        --glass-bg: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        --neon-glow-shadow: 0 0 20px rgba(99, 102, 241, 0.3);

        --blob-opacity: 0.15;
        --overlay-bg: rgba(15, 23, 42, 0.7);

        --nav-bg: rgba(5, 6, 12, 0.85);
        --nav-active: #818cf8;
        --nav-inactive: #64748b;

        --canvas-bg: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);

        --accent-bg: #6366f1;
        --accent-bg-soft: rgba(99, 102, 241, 0.25);
        --accent-bg-active: rgba(99, 102, 241, 0.3);
        --accent-border: rgba(99, 102, 241, 0.4);
        --accent-border-active: rgba(129, 140, 248, 0.6);
        --accent-text: #a5b4fc;
        --accent-text-soft: #c7d2fe;
        --accent-text-on-active: #ffffff;

        --auth-hero-bg: linear-gradient(160deg, #02050d 0%, #060b17 52%, #090f1e 100%);
        --auth-hero-text: rgba(255, 255, 255, 0.92);
        --auth-hero-muted: rgba(255, 255, 255, 0.6);
        --auth-hero-quote: rgba(255, 255, 255, 0.1);
        --auth-hero-ring-indigo: rgba(165, 180, 252, 0.1);
        --auth-hero-ring-cyan: rgba(103, 232, 249, 0.1);
        --auth-hero-line: rgba(103, 232, 249, 0.35);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .font-geist {
        font-family: 'Geist', sans-serif;
      }

      /* Static ambient background (GPU-friendly). */
      .bg-canvas {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: var(--canvas-bg);
      }
      .bg-canvas::before,
      .bg-canvas::after {
        content: "";
        position: absolute;
        inset: -10%;
        pointer-events: none;
        opacity: var(--blob-opacity);
      }
      .bg-canvas::before {
        background:
          radial-gradient(40rem 40rem at 10% 10%, color-mix(in srgb, var(--neon-primary) 20%, transparent), transparent 65%),
          radial-gradient(36rem 36rem at 90% 90%, color-mix(in srgb, var(--neon-secondary) 18%, transparent), transparent 70%);
      }
      .bg-canvas::after {
        background:
          radial-gradient(28rem 28rem at 82% 16%, color-mix(in srgb, var(--neon-primary) 12%, transparent), transparent 72%);
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow);
      }

      .neon-glow-hover:hover {
        box-shadow: var(--neon-glow-shadow);
      }

      /* Improve legibility for microcopy across the app. */
      .text-xs {
        font-size: 0.875rem;
        line-height: 1.25rem;
      }
      .text-\[10px\],
      .text-\[11px\] {
        font-size: 0.8rem;
        line-height: 1.1rem;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19",
    "react-dom": "https://esm.sh/react-dom@19",
    "react-dom/client": "https://esm.sh/react-dom@19/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.5",
    "zod": "https://esm.sh/zod@^4.2.1",
    "jsonwebtoken": "https://esm.sh/jsonwebtoken@^9.0.3",
    "helmet": "https://esm.sh/helmet@^8.1.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="bg-canvas"></div>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
