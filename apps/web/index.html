
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buildora | The Standard for Modern Hackathons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-primary: #6366f1;
        --neon-secondary: #06b6d4;
        --bg-deep: #030712;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-deep);
        color: #f8fafc;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .font-geist {
        font-family: 'Geist', sans-serif;
      }
      
      /* Moving Neon Background */
      .bg-canvas {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
      }
      .neon-blob {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        pointer-events: none;
      }
      .blob-1 {
        background: var(--neon-primary);
        top: -10%;
        left: -10%;
        animation: drift 20s infinite alternate ease-in-out;
      }
      .blob-2 {
        background: var(--neon-secondary);
        bottom: -10%;
        right: -10%;
        animation: drift 25s infinite alternate-reverse ease-in-out;
      }
      @keyframes drift {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(100px, 50px) scale(1.2); }
      }

      .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .neon-glow-hover:hover {
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
      }

      /* Improve legibility for microcopy across the app. */
      .text-xs {
        font-size: 0.875rem;
        line-height: 1.25rem;
      }
      .text-\[10px\],
      .text-\[11px\] {
        font-size: 0.8rem;
        line-height: 1.1rem;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19",
    "react-dom": "https://esm.sh/react-dom@19",
    "react-dom/client": "https://esm.sh/react-dom@19/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.5",
    "zod": "https://esm.sh/zod@^4.2.1",
    "jsonwebtoken": "https://esm.sh/jsonwebtoken@^9.0.3",
    "helmet": "https://esm.sh/helmet@^8.1.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="bg-canvas">
      <div class="neon-blob blob-1"></div>
      <div class="neon-blob blob-2"></div>
    </div>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
